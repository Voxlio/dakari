<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Dakari — Real-Time Frequency Chat</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/HTDc4cTQ/dakari-logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Lexend+Exa:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080808;
            --accent-lime: #95F651;
            --text-muted: rgba(255, 255, 255, 0.5);
            --border-color: rgba(255, 255, 255, 0.08);
            --reply-bg: rgba(79, 70, 229, 0.15); 
            --reply-border: rgba(99, 102, 241, 0.4);
            --tag-bg: rgba(149, 246, 81, 0.1);
        }
        body { 
            background-color: var(--bg-color); 
            color: white; 
            font-family: 'Manrope', sans-serif; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
            height: 100dvh;
        }
        .font-exa { font-family: 'Lexend+Exa', sans-serif; }
        
        /* Animated Background Layers */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111 0%, #080808 100%);
        }

        .bg-gradient-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(149, 246, 81, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(99, 102, 241, 0.03) 0%, transparent 40%);
            filter: blur(80px);
            animation: drift 20s infinite alternate ease-in-out;
        }

        @keyframes drift {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(2%, 2%); }
        }

        .noise-texture {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.02;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-msg { animation: slideIn 0.3s ease forwards; }

        .orb-button { border: 1px solid var(--border-color); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .orb-button:hover { background-color: white; color: black; transform: translateY(-1px); }
        
        .accent-button { background-color: var(--accent-lime); color: black; transition: all 0.3s ease; }
        .accent-button:hover { transform: scale(1.02); box-shadow: 0 0 25px rgba(149, 246, 81, 0.3); }

        .status-dot { width: 8px; height: 8px; background-color: #71717a; border-radius: 50%; position: relative; transition: background-color 0.5s ease; }
        .status-dot.active { background-color: var(--accent-lime); }
        .status-dot.active::after { content: ''; position: absolute; inset: -4px; border: 1px solid var(--accent-lime); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        .text-gradient { background: linear-gradient(180deg, #FFFFFF 0%, #777 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .msg-bubble {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            position: relative;
            font-size: 14px;
            line-height: 1.5;
            transition: transform 0.1s linear;
            will-change: transform;
            backdrop-filter: blur(8px);
        }
        .msg-received { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); }
        .msg-sent { background: var(--accent-lime); color: black; }

        .reply-context {
            font-size: 11px;
            padding: 10px 14px;
            background: var(--reply-bg);
            border-left: 3px solid var(--accent-lime);
            margin-bottom: 8px;
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }
        .msg-sent .reply-context {
            background: rgba(0, 0, 0, 0.12);
            border-left-color: rgba(0, 0, 0, 0.4);
            color: rgba(0, 0, 0, 0.7);
        }

        .mention-tag {
            color: var(--accent-lime);
            font-weight: 700;
            background: var(--tag-bg);
            padding: 0 4px;
            border-radius: 4px;
            text-transform: uppercase;
            font-size: 0.95em;
        }
        .msg-sent .mention-tag {
            color: black;
            background: rgba(0, 0, 0, 0.1);
            text-decoration: underline;
        }

        .receipt-dot {
            width: 4px;
            height: 4px;
            background: var(--accent-lime);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--accent-lime);
            animation: receipt-pulse 1.5s infinite ease-in-out;
        }
        .receipt-dot:nth-child(2) { animation-delay: 0.2s; }
        
        @keyframes receipt-pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .reaction-chip {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .reaction-chip.active {
            background: var(--accent-lime);
            color: black;
            border-color: transparent;
        }

        .typing-indicator { display: flex; gap: 3px; padding: 4px 8px; }
        .typing-dot { width: 4px; height: 4px; background: var(--accent-lime); border-radius: 50%; animation: typing 1.4s infinite; opacity: 0.4; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); opacity: 1; } }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        input { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid var(--border-color) !important; color: white !important; }
        input:focus { border-color: var(--accent-lime) !important; outline: none; }

        .glass-overlay {
            backdrop-filter: blur(12px);
            background: rgba(8, 8, 8, 0.85);
        }

        .msg-actions {
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
            transform: scale(0.95);
        }
        .group:hover .msg-actions, .actions-active .msg-actions {
            opacity: 1 !important;
            pointer-events: auto !important;
            transform: scale(1);
        }

        .swipe-indicator {
            position: absolute;
            left: -40px;
            top: 50%;
            transform: translateY(-50%) scale(0.5);
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            color: var(--accent-lime);
            z-index: 0;
        }
        .swiping .swipe-indicator { opacity: 1; transform: translateY(-50%) scale(1); }
        #reply-preview { background: var(--reply-bg); border: 1px solid var(--reply-border); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="antialiased overflow-hidden">

    <!-- Background System -->
    <canvas id="bg-canvas"></canvas>
    <div class="bg-gradient-overlay"></div>
    <div class="noise-texture"></div>

    <!-- Username Selection Overlay -->
    <div id="username-overlay" class="fixed inset-0 z-[100] glass-overlay flex items-center justify-center p-6 hidden">
        <div class="max-w-sm w-full space-y-8 text-center">
            <div class="space-y-2">
                <h2 class="text-3xl font-bold tracking-tighter">Identify Yourself</h2>
                <p class="text-white/40 text-sm">Choose a frequency alias to continue.</p>
            </div>
            <div class="relative">
                <input id="nickname-input" type="text" placeholder="ALIAS_NAME" maxlength="15"
                    class="w-full px-8 py-5 rounded-full text-center font-exa tracking-widest text-sm uppercase">
                <button onclick="window.saveNickname()" class="mt-6 accent-button w-full py-4 rounded-full font-bold uppercase text-[10px] tracking-widest">
                    Engage Protocol
                </button>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 px-6 py-5 border-b border-white/[0.05] bg-[#080808]/60 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center gap-4">
            <div class="flex items-center gap-6 shrink-0">
                <a href="#" class="text-xl sm:text-2xl font-bold tracking-tighter hover:text-[#95F651] transition-colors">.dakari</a>
                <div class="hidden md:flex items-center gap-3 border-l border-white/10 pl-6">
                    <div id="auth-status" class="status-dot"></div>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-white/40 font-bold">Encrypted Link</span>
                </div>
            </div>
            
            <div id="room-controls" class="flex items-center gap-2 sm:gap-4 flex-1 justify-end">
                <button onclick="window.createRoom()" class="orb-button px-4 py-2 rounded-full text-[9px] sm:text-[10px] font-bold uppercase tracking-wider shrink-0">Auto-Generate</button>
                <div class="relative group hidden sm:flex items-center">
                    <input id="join-code-input" type="text" placeholder="CODE" class="px-4 py-2 rounded-full text-[10px] font-exa tracking-widest w-24 sm:w-32 transition-all focus:w-40">
                    <button onclick="window.joinRoom()" class="absolute right-2 top-1/2 -translate-y-1/2 text-white/40 hover:text-[#95F651]">
                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <div id="active-room-header" class="hidden flex items-center gap-4 sm:gap-6">
                <div class="flex flex-col items-end">
                    <span class="text-[9px] text-white/40 uppercase tracking-[0.2em]">Frequency</span>
                    <span id="display-room-code" class="font-exa text-xs sm:text-sm tracking-widest text-[#95F651]"></span>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.leaveRoom()" class="p-2 border border-white/10 rounded-full hover:bg-red-500 hover:text-white transition-all">
                        <i data-lucide="power" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="h-full flex flex-col pt-24">
        <!-- Lobby State -->
        <section id="lobby" class="flex-1 flex flex-col items-center justify-center py-12 px-6 text-center space-y-12 overflow-y-auto z-10">
            <div class="space-y-6">
                <div class="flex justify-center"><div class="status-dot active"></div></div>
                <h1 class="text-5xl md:text-8xl font-medium leading-[1.1] tracking-tight">Zero-friction <br> <span class="text-gradient">chat protocol</span></h1>
                <p class="text-white/40 max-w-lg mx-auto text-sm leading-relaxed">No accounts. No logs. Just frequencies.</p>
            </div>
            
            <div class="flex flex-col items-center gap-8 w-full max-w-sm mx-auto">
                <button onclick="window.createRoom()" class="accent-button w-full px-10 py-5 rounded-full font-bold uppercase text-xs tracking-widest">
                    Initialize Frequency
                </button>
                
                <div class="flex flex-col gap-4 w-full">
                    <div class="flex items-center gap-2">
                        <div class="h-[1px] bg-white/10 flex-1"></div>
                        <span class="text-[9px] uppercase tracking-[0.3em] text-white/20">reconnect</span>
                        <div class="h-[1px] bg-white/10 flex-1"></div>
                    </div>
                    
                    <div class="relative group">
                        <input id="lobby-join-input" type="text" placeholder="ENTER FREQUENCY CODE" 
                            class="w-full px-8 py-5 rounded-full text-center font-exa tracking-widest text-sm transition-all border-white/10">
                        <button onclick="window.joinRoom(document.getElementById('lobby-join-input').value)" 
                            class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full orb-button flex items-center justify-center">
                            <i data-lucide="zap" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Chat Room State -->
        <section id="chat-dashboard" class="hidden flex-1 flex flex-col h-full max-w-5xl mx-auto w-full relative overflow-hidden z-10">
            <!-- Online Users Bar -->
            <div id="online-users-bar" class="px-6 py-3 border-b border-white/5 flex items-center gap-3 overflow-x-auto custom-scrollbar bg-black/40 shrink-0">
                <span class="text-[9px] uppercase tracking-widest text-white/20 shrink-0">Engaged:</span>
                <div id="online-list" class="flex gap-2"></div>
            </div>

            <!-- Pinned Messages Bar -->
            <div id="pinned-bar" class="hidden px-6 py-2 bg-white/[0.03] border-b border-white/5 flex items-center gap-4 overflow-x-auto custom-scrollbar shrink-0">
                <div class="flex items-center gap-1 shrink-0 text-[#95F651]">
                    <i data-lucide="pin" class="w-3 h-3"></i>
                    <span class="text-[8px] font-bold uppercase tracking-widest">Pinned</span>
                </div>
                <div id="pinned-list" class="flex gap-3"></div>
            </div>

            <!-- Message List -->
            <div id="message-container" class="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar flex flex-col">
                <div class="py-20 text-center space-y-4">
                    <div class="w-10 h-10 border border-white/10 rounded-full flex items-center justify-center mx-auto opacity-20">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </div>
                    <p class="uppercase tracking-[0.4em] text-[9px] text-white/20">Frequency Secure</p>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div id="typing-status" class="px-8 h-6 flex items-center gap-2 text-[10px] text-white/40 italic font-medium transition-opacity opacity-0">
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
                <span id="typing-text">someone is typing</span>
            </div>

            <!-- Reply Preview -->
            <div id="reply-preview" class="hidden mx-6 mb-2 p-3 rounded-2xl flex items-center justify-between animate-msg">
                <div class="flex flex-col border-l-2 border-[#95F651] pl-3">
                    <span id="reply-to-name" class="text-[10px] font-bold text-[#95F651] uppercase"></span>
                    <span id="reply-to-text" class="text-xs text-white/60 truncate max-w-[250px]"></span>
                </div>
                <button onclick="window.cancelReply()" class="p-2 text-white/40 hover:text-red-400 transition-colors">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>

            <!-- Message Input -->
            <div class="p-6 bg-[#080808]/40 shrink-0 backdrop-blur-xl">
                <form id="chat-form" class="relative group" onsubmit="window.sendMessage(event)">
                    <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off"
                        class="w-full px-8 py-5 rounded-full pr-16 text-sm">
                    <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 w-12 h-12 accent-button rounded-full flex items-center justify-center">
                        <i data-lucide="arrow-up" class="w-5 h-5"></i>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <div id="toast-container" class="fixed bottom-24 right-6 sm:right-10 z-[100] flex flex-col gap-3"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, query, orderBy, addDoc, setDoc, updateDoc, serverTimestamp, limit, arrayUnion } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBYgpxl4SDX121bwv9vrVGcDHWd0A2KaYY",
            authDomain: "dakari-eca1a.firebaseapp.com",
            projectId: "dakari-eca1a",
            storageBucket: "dakari-eca1a.firebasestorage.app",
            messagingSenderId: "294760021577",
            appId: "1:294760021577:web:436dcfd7e898c6448bc998",
            measurementId: "G-FNHX2H9DH0"
        };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dakari-pro';
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentRoom = null;
        let unsubscribeMessages = null;
        let unsubscribePresence = null;
        let unsubscribeTyping = null;
        let heartbeatInterval = null;
        let currentUser = null;
        let nickname = localStorage.getItem('dakari_nick') || null;
        let typingTimeout = null;
        let cachedMessages = [];
        let replyingTo = null;

        // Background Neural System
        function initBackground() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let stars = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initParticles();
            }

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.2;
                    this.vy = (Math.random() - 0.5) * 0.2;
                    this.radius = Math.random() * 1.5;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(149, 246, 81, 0.2)';
                    ctx.fill();
                }
            }

            class Star {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.opacity = Math.random();
                    this.factor = 1;
                    this.speed = Math.random() * 0.01;
                }
                draw() {
                    this.opacity += this.factor * this.speed;
                    if (this.opacity > 1 || this.opacity < 0.2) this.factor *= -1;
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity * 0.15})`;
                    ctx.fillRect(this.x, this.y, 1, 1);
                }
            }

            function initParticles() {
                particles = [];
                stars = [];
                const count = Math.floor((canvas.width * canvas.height) / 15000);
                for (let i = 0; i < count; i++) particles.push(new Particle());
                for (let i = 0; i < 150; i++) stars.push(new Star());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => s.draw());
                particles.forEach((p, i) => {
                    p.update();
                    p.draw();
                    for (let j = i + 1; j < particles.length; j++) {
                        const p2 = particles[j];
                        const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                        if (dist < 150) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = `rgba(149, 246, 81, ${0.05 * (1 - dist / 150)})`;
                            ctx.stroke();
                        }
                    }
                });
                requestAnimationFrame(animate);
            }
            window.addEventListener('resize', resize);
            resize();
            animate();
        }

        // Identity Management
        window.saveNickname = () => {
            const input = document.getElementById('nickname-input');
            const val = input.value.trim().toUpperCase();
            if (val.length < 2) return showToast("NAME_TOO_SHORT", "error");
            nickname = val;
            localStorage.setItem('dakari_nick', nickname);
            document.getElementById('username-overlay').classList.add('hidden');
            showToast(`GREETINGS_${nickname}`, "success");
        };

        async function initAuth() { 
            try {
                await signInAnonymously(auth);
                if (!nickname) {
                    document.getElementById('username-overlay').classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
                showToast("CORE_SYNC_ERROR", "error");
            }
        }

        onAuthStateChanged(auth, (user) => { 
            currentUser = user; 
            document.getElementById('auth-status').classList.toggle('active', !!user);
        });

        window.createRoom = () => {
            const code = Math.random().toString(36).substr(2, 6).toUpperCase();
            window.joinRoom(code);
        };

        window.joinRoom = (code) => {
            const rawCode = code || document.getElementById('join-code-input').value.trim();
            if (!rawCode) return showToast("VOID_CODE", "error");
            if (!nickname) {
                document.getElementById('username-overlay').classList.remove('hidden');
                return;
            }
            currentRoom = rawCode.toUpperCase();
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('chat-dashboard').classList.remove('hidden');
            document.getElementById('active-room-header').classList.remove('hidden');
            document.getElementById('room-controls').classList.add('hidden');
            document.getElementById('display-room-code').innerText = currentRoom;
            startPresence();
            listenToMessages();
            listenToPresence();
            listenToTyping();
            setupTypingListener();
            showToast(`FREQUENCY_${currentRoom}_ENGAGED`, "success");
        };

        window.leaveRoom = async () => {
            if (unsubscribeMessages) unsubscribeMessages();
            if (unsubscribePresence) unsubscribePresence();
            if (unsubscribeTyping) unsubscribeTyping();
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            if (currentUser && currentRoom) {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', `presence_${currentRoom}`, currentUser.uid), {
                        name: nickname,
                        lastSeen: new Date(0)
                    }, { merge: true });
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', `typing_${currentRoom}`, currentUser.uid), {
                        name: nickname,
                        isTyping: false
                    }, { merge: true });
                } catch (e) {}
            }
            currentRoom = null;
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('chat-dashboard').classList.add('hidden');
            document.getElementById('room-controls').classList.remove('hidden');
            document.getElementById('active-room-header').classList.add('hidden');
            document.getElementById('message-container').innerHTML = '';
            document.getElementById('online-list').innerHTML = '';
            document.getElementById('pinned-bar').classList.add('hidden');
            window.cancelReply();
            showToast("SESSION_TERMINATED", "info");
        };

        // Presence Logic
        async function startPresence() {
            if (!currentUser || !currentRoom) return;
            const updatePresence = async () => {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', `presence_${currentRoom}`, currentUser.uid), {
                        name: nickname,
                        lastSeen: serverTimestamp()
                    }, { merge: true });
                } catch (e) {}
            };
            updatePresence();
            heartbeatInterval = setInterval(updatePresence, 20000);
        }

        function listenToPresence() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', `presence_${currentRoom}`);
            unsubscribePresence = onSnapshot(q, (snapshot) => {
                const list = document.getElementById('online-list');
                const users = snapshot.docs.map(d => d.data());
                const now = Date.now();
                const activeUsers = users.filter(u => u.lastSeen && (now - u.lastSeen.seconds * 1000) < 60000);
                list.innerHTML = activeUsers.map(u => `
                    <div onclick="window.tagUser('${u.name}')" class="flex items-center gap-1.5 px-3 py-1 bg-white/5 border border-white/5 rounded-full cursor-pointer hover:bg-white/10 transition-colors">
                        <div class="w-1.5 h-1.5 rounded-full bg-[#95F651]"></div>
                        <span class="text-[9px] font-bold uppercase tracking-widest text-white/60">${u.name}</span>
                    </div>
                `).join('');
            });
        }

        // Tagging & Mentions
        window.tagUser = (name) => {
            const input = document.getElementById('msg-input');
            const mention = `@${name.toUpperCase()} `;
            if (!input.value.includes(mention)) {
                input.value += mention;
            }
            input.focus();
        };

        function processMentions(text) {
            return text.replace(/@(\w+)/g, '<span class="mention-tag">@$1</span>');
        }

        // Typing logic
        function setupTypingListener() {
            const input = document.getElementById('msg-input');
            input.addEventListener('input', () => {
                if (!currentUser || !currentRoom) return;
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', `typing_${currentRoom}`, currentUser.uid), {
                    name: nickname,
                    isTyping: true,
                    timestamp: serverTimestamp()
                }, { merge: true });
                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', `typing_${currentRoom}`, currentUser.uid), {
                        isTyping: false
                    }, { merge: true });
                }, 3000);
            });
        }

        function listenToTyping() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', `typing_${currentRoom}`);
            unsubscribeTyping = onSnapshot(q, (snapshot) => {
                const statusEl = document.getElementById('typing-status');
                const textEl = document.getElementById('typing-text');
                const typers = snapshot.docs.map(d => d.data()).filter(u => u.isTyping && u.name !== nickname);
                if (typers.length > 0) {
                    textEl.innerText = `${typers.map(t => t.name).join(', ')} typing...`;
                    statusEl.classList.remove('opacity-0');
                } else {
                    statusEl.classList.add('opacity-0');
                }
            });
        }

        // Gesture Logic: Swipe & Long Press
        window.setReply = (msgId) => {
            const msg = cachedMessages.find(m => m.id === msgId);
            if (!msg) return;
            replyingTo = msg;
            const preview = document.getElementById('reply-preview');
            const nameEl = document.getElementById('reply-to-name');
            const textEl = document.getElementById('reply-to-text');
            nameEl.innerText = msg.senderName;
            textEl.innerText = msg.text;
            preview.classList.remove('hidden');
            document.getElementById('msg-input').focus();
            if (window.lucide) window.lucide.createIcons();
        };

        window.cancelReply = () => {
            replyingTo = null;
            document.getElementById('reply-preview').classList.add('hidden');
        };

        function attachGestureEvents(element, msgId) {
            let startX = 0;
            let currentX = 0;
            let pressTimer = null;
            const threshold = 60;
            const bubble = element.querySelector('.msg-bubble');

            element.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                element.classList.add('swiping');

                // Long Press Timer
                pressTimer = setTimeout(() => {
                    // Lock actions visible
                    document.querySelectorAll('.actions-active').forEach(el => el.classList.remove('actions-active'));
                    element.classList.add('actions-active');
                    if (window.navigator.vibrate) window.navigator.vibrate(50);
                }, 500);
            }, { passive: true });

            element.addEventListener('touchmove', (e) => {
                currentX = e.touches[0].clientX;
                let delta = currentX - startX;
                
                // If moving significantly, cancel long press
                if (Math.abs(delta) > 10) clearTimeout(pressTimer);

                if (delta < 0) delta = 0; 
                if (delta > 80) delta = 80; 
                bubble.style.transform = `translateX(${delta}px)`;
            }, { passive: true });

            element.addEventListener('touchend', () => {
                clearTimeout(pressTimer);
                let delta = currentX - startX;
                element.classList.remove('swiping');
                bubble.style.transform = '';
                if (delta >= threshold) {
                    window.setReply(msgId);
                    if (window.navigator.vibrate) window.navigator.vibrate(10);
                }
                startX = 0;
                currentX = 0;
            });
        }

        // Global click listener to dismiss active action menus
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.group')) {
                document.querySelectorAll('.actions-active').forEach(el => el.classList.remove('actions-active'));
            }
        });

        // Reactions & Pinning Logic
        window.toggleReaction = async (msgId, emoji) => {
            const msg = cachedMessages.find(m => m.id === msgId);
            if (!msg) return;
            const reactions = msg.reactions || {};
            const userList = reactions[emoji] || [];
            const index = userList.indexOf(currentUser.uid);
            if (index > -1) userList.splice(index, 1);
            else userList.push(currentUser.uid);
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', `chat_${currentRoom}`, msgId), {
                    [`reactions.${emoji}`]: userList
                });
            } catch (e) { showToast("REACTION_FAIL", "error"); }
        };

        window.togglePin = async (msgId) => {
            const msg = cachedMessages.find(m => m.id === msgId);
            if (!msg) return;
            const pinnedMessages = cachedMessages.filter(m => m.isPinned);
            if (!msg.isPinned && pinnedMessages.length >= 5) {
                return showToast("MAX_PINS_REACHED (5)", "error");
            }
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', `chat_${currentRoom}`, msgId), {
                    isPinned: !msg.isPinned,
                    pinnedAt: !msg.isPinned ? serverTimestamp() : null
                });
                showToast(!msg.isPinned ? "PINNED" : "UNPINNED", "info");
            } catch (e) { showToast("PIN_FAIL", "error"); }
        };

        function updatePinnedUI(pinned) {
            const bar = document.getElementById('pinned-bar');
            const list = document.getElementById('pinned-list');
            if (pinned.length === 0) {
                bar.classList.add('hidden');
                return;
            }
            bar.classList.remove('hidden');
            list.innerHTML = pinned.map(m => `
                <button onclick="document.getElementById('msg-${m.id}').scrollIntoView({behavior: 'smooth'})" 
                    class="px-3 py-1 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg text-[9px] text-white/60 truncate max-w-[120px]">
                    ${m.text}
                </button>
            `).join('');
        }

        function listenToMessages() {
            if (unsubscribeMessages) unsubscribeMessages();
            const q = collection(db, 'artifacts', appId, 'public', 'data', `chat_${currentRoom}`);
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const container = document.getElementById('message-container');
                cachedMessages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                cachedMessages.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                
                cachedMessages.forEach(msg => {
                   if (msg.senderId !== currentUser.uid && (!msg.readBy || !msg.readBy.includes(currentUser.uid))) {
                       updateDoc(doc(db, 'artifacts', appId, 'public', 'data', `chat_${currentRoom}`, msg.id), {
                           readBy: arrayUnion(currentUser.uid)
                       });
                   }
                });

                const pinned = cachedMessages.filter(m => m.isPinned).sort((a,b) => (b.pinnedAt?.seconds || 0) - (a.pinnedAt?.seconds || 0));
                updatePinnedUI(pinned);

                container.innerHTML = '';
                if(cachedMessages.length === 0) {
                   container.innerHTML = `<div class="py-20 text-center opacity-10 uppercase tracking-widest text-xs">Void Detected</div>`;
                }
                cachedMessages.forEach(msg => renderMessage(msg));
                container.scrollTop = container.scrollHeight;
                if (window.lucide) window.lucide.createIcons();
            });
        }

        function renderMessage(msg) {
            const container = document.getElementById('message-container');
            const isMe = msg.senderId === currentUser?.uid;
            const div = document.createElement('div');
            div.id = `msg-${msg.id}`;
            div.className = `flex flex-col items-start animate-msg group relative py-1`;
            const time = msg.createdAt ? new Date(msg.createdAt.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...';
            
            let reactionsHtml = '';
            if (msg.reactions) {
                reactionsHtml = `<div class="flex gap-1.5 mt-2 flex-wrap">`;
                for (const [emoji, users] of Object.entries(msg.reactions)) {
                    if (users.length > 0) {
                        const active = users.includes(currentUser.uid);
                        reactionsHtml += `
                            <div onclick="window.toggleReaction('${msg.id}', '${emoji}')" class="reaction-chip ${active ? 'active' : ''}">
                                ${emoji} ${users.length}
                            </div>
                        `;
                    }
                }
                reactionsHtml += `</div>`;
            }

            let replyHtml = '';
            if (msg.replyTo) {
                replyHtml = `
                    <div class="reply-context">
                        <div class="font-bold uppercase tracking-widest" style="font-size: 8px">${msg.replyTo.senderName}</div>
                        <div class="truncate opacity-60">${processMentions(msg.replyTo.text)}</div>
                    </div>
                `;
            }

            const processedMsgText = processMentions(msg.text);
            const isSeen = msg.readBy && msg.readBy.length > 1;

            div.innerHTML = `
                <div class="flex items-center gap-2 mb-1">
                    <span onclick="window.tagUser('${msg.senderName}')" class="text-[9px] font-bold uppercase tracking-widest text-white/30 cursor-pointer hover:text-[#95F651] transition-colors">${msg.senderName}</span>
                    ${msg.isPinned ? `<i data-lucide="pin" class="w-2.5 h-2.5 text-[#95F651]"></i>` : ''}
                </div>
                <div class="relative max-w-full flex flex-row items-center">
                    <div class="swipe-indicator"><i data-lucide="reply" class="w-4 h-4"></i></div>
                    <div class="msg-bubble ${isMe ? 'msg-sent' : 'msg-received'}">
                        ${replyHtml}
                        <div class="msg-text-content">${processedMsgText}</div>
                    </div>
                    <!-- Action Bar -->
                    <div class="msg-actions absolute left-full ml-2 top-1/2 -translate-y-1/2 flex items-center gap-1 bg-[#151515] p-1 rounded-full border border-white/10 shadow-xl z-10">
                        <button onclick="window.togglePin('${msg.id}')" class="p-1.5 hover:text-[#95F651] transition-colors ${msg.isPinned ? 'text-[#95F651]' : 'text-white/40'}"><i data-lucide="pin" class="w-3 h-3"></i></button>
                        <button onclick="window.setReply('${msg.id}')" class="p-1.5 hover:text-[#95F651] transition-colors text-white/40"><i data-lucide="reply" class="w-3 h-3"></i></button>
                        <div class="h-3 w-[1px] bg-white/10 mx-1"></div>
                        ${['🔥','❤️','👍','😂','😮'].map(e => `<button onclick="window.toggleReaction('${msg.id}', '${e}')" class="p-1 hover:scale-125 transition-transform text-xs">${e}</button>`).join('')}
                    </div>
                </div>
                <div class="flex items-center gap-1.5 mt-1 mx-2">
                    <span class="text-[8px] text-white/20 uppercase tracking-tighter">${time}</span>
                    ${isMe ? `<div class="flex gap-0.5 items-center"><div class="receipt-dot"></div>${isSeen ? `<div class="receipt-dot"></div>` : ''}</div>` : ''}
                </div>
                ${reactionsHtml}
            `;
            container.appendChild(div);
            attachGestureEvents(div, msg.id);
        }

        window.sendMessage = async (e) => {
            if (e) e.preventDefault();
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !currentRoom || !currentUser) return;
            const payload = {
                text,
                senderName: nickname,
                senderId: currentUser.uid,
                createdAt: serverTimestamp(),
                reactions: {},
                isPinned: false,
                readBy: [currentUser.uid]
            };
            if (replyingTo) {
                payload.replyTo = { msgId: replyingTo.id, text: replyingTo.text, senderName: replyingTo.senderName };
            }
            input.value = '';
            window.cancelReply();
            setDoc(doc(db, 'artifacts', appId, 'public', 'data', `typing_${currentRoom}`, currentUser.uid), {
                isTyping: false
            }, { merge: true });
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `chat_${currentRoom}`), payload);
            } catch (err) { showToast("SEND_FAILURE", "error"); }
        };

        function showToast(msg, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const styles = { success: "border-[#95F651] text-[#95F651]", error: "border-red-500 text-red-400", info: "border-white/20 text-white/60" };
            toast.className = `px-6 py-4 rounded-full border bg-[#080808]/90 backdrop-blur-sm text-[10px] font-bold uppercase tracking-[0.2em] shadow-2xl transition-all duration-500 transform translate-x-full ${styles[type]}`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.style.transform = "translateX(0)", 10);
            setTimeout(() => { toast.style.opacity = "0"; setTimeout(() => toast.remove(), 500); }, 3000);
        }

        window.addEventListener('DOMContentLoaded', () => { 
            initAuth();
            initBackground();
            if (window.lucide) window.lucide.createIcons();
            const urlParams = new URLSearchParams(window.location.search);
            const r = urlParams.get('r');
            if (r) setTimeout(() => window.joinRoom(r), 1000);
        });
    </script>
</body>
</html>
